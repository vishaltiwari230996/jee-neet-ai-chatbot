# Alembic configuration. Database URL is read from the NEETAI_DATABASE_URL
# env var by `env.py` — do NOT put a real URL here.
[alembic]
# %(here)s is the directory containing this alembic.ini — keeps these paths
# valid regardless of which directory you invoke `alembic` from.
script_location = %(here)s
prepend_sys_path = %(here)s/../adapters/db_postgres/src
file_template = %%(rev)s_%%(slug)s
timezone = UTC
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
