[project]
name = "neetai-safety"
version = "0.1.0"
description = "Input + output guardrails. Banned phrases, false-guarantee detector, distress escalation (Phase 5)."
requires-python = ">=3.12,<3.13"
dependencies = ["neetai-core", "neetai-ports"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/neetai_safety"]
