[project]
name = "neetai-core"
version = "0.1.0"
description = "Shared domain types, errors, and value objects. Depended on by every other package."
requires-python = ">=3.12,<3.13"
dependencies = [
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/neetai_core"]
