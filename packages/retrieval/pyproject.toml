[project]
name = "neetai-retrieval"
version = "0.1.0"
description = "RAG: chunking, embedding, hybrid search, reranking (Phase 4)."
requires-python = ">=3.12,<3.13"
dependencies = ["neetai-core", "neetai-ports"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/neetai_retrieval"]
