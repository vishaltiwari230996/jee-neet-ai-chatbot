[project]
name = "neetai-question-bank"
version = "0.1.0"
description = "Diagnostic question selector (rule-based first, Phase 1)."
requires-python = ">=3.12,<3.13"
dependencies = ["neetai-core", "neetai-ports"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/neetai_question_bank"]
