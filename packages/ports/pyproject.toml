[project]
name = "neetai-ports"
version = "0.1.0"
description = "Pure-Protocol interfaces for every external dependency. Decouples domain from infrastructure."
requires-python = ">=3.12,<3.13"
dependencies = [
    "neetai-core",
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/neetai_ports"]
